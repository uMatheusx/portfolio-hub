name: Receive Release

on:
  repository_dispatch:
    types: [new-release]

jobs:
  update-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update project metadata
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          JSON_FILE="projects/${PROJECT}.json"

          # Preserve fields that come from the docs flow
          DOCS_TS=""
          TAGS="[]"
          DESCRIPTION=""
          if [ -f "$JSON_FILE" ]; then
            DOCS_TS=$(jq -r '.docs_updated_at // ""' "$JSON_FILE")
            TAGS=$(jq -r '.tags // []' "$JSON_FILE")
            DESCRIPTION=$(jq -r '.description // ""' "$JSON_FILE")
          fi

          # display_name and description from dispatch take priority if provided
          DISPLAY_NAME="${{ github.event.client_payload.display_name }}"
          NEW_DESC="${{ github.event.client_payload.description }}"
          [ -n "$NEW_DESC" ] && DESCRIPTION="$NEW_DESC"

          jq -n \
            --arg name "$PROJECT" \
            --arg display_name "$DISPLAY_NAME" \
            --arg description "$DESCRIPTION" \
            --arg version "${{ github.event.client_payload.version }}" \
            --arg repo_url "${{ github.event.client_payload.repo_url }}" \
            --arg docs_ts "$DOCS_TS" \
            --arg changelog_ts "${{ github.event.client_payload.updated_at }}" \
            --argjson tags "$TAGS" \
            '{
              name: $name,
              display_name: $display_name,
              description: $description,
              version: $version,
              tags: $tags,
              repo_url: $repo_url,
              docs_updated_at: $docs_ts,
              changelog_updated_at: $changelog_ts
            }' > "$JSON_FILE"

      - name: Fetch CHANGELOG.md from project repo
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          REPO_URL="${{ github.event.client_payload.repo_url }}"
          OWNER_REPO="${REPO_URL#https://github.com/}"

          mkdir -p changelogs

          # Try CHANGELOG.md first, fall back to GitHub release body
          curl -sf \
            -H "Authorization: token ${{ secrets.PORTFOLIO_TOKEN }}" \
            "https://raw.githubusercontent.com/${OWNER_REPO}/main/CHANGELOG.md" \
            > "changelogs/${PROJECT}.md" || \
          curl -sf \
            -H "Authorization: token ${{ secrets.PORTFOLIO_TOKEN }}" \
            "https://api.github.com/repos/${OWNER_REPO}/releases/latest" \
            | jq -r '"## [" + .tag_name + "] - " + (.published_at | split("T")[0]) + "\n\n" + (.body // "Sem notas de release.")' \
            > "changelogs/${PROJECT}.md"

      - name: Commit and push
        run: |
          git config user.name "portfolio-bot[bot]"
          git config user.email "portfolio-bot@users.noreply.github.com"
          git add projects/ changelogs/
          git diff --staged --quiet || git commit -m "release(${{ github.event.client_payload.project }}): ${{ github.event.client_payload.version }}"
          git push
