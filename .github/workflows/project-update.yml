name: Project Update

on:
  repository_dispatch:
    types: [project-update]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar metadados do projeto
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          VERSION="${{ github.event.client_payload.version }}"
          DISPLAY_NAME="${{ github.event.client_payload.display_name }}"
          DESCRIPTION="${{ github.event.client_payload.description }}"
          TAGS='${{ toJSON(github.event.client_payload.tags) }}'
          REPO="${{ github.event.client_payload.repo }}"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FILE="projects/$PROJECT.json"

          if [ ! -f "$FILE" ]; then
            echo "Arquivo $FILE não encontrado, criando..."
            mkdir -p projects
            echo "{}" > "$FILE"
          fi

          jq \
            --arg name "$PROJECT" \
            --arg displayName "$DISPLAY_NAME" \
            --arg version "$VERSION" \
            --arg description "$DESCRIPTION" \
            --arg repoUrl "https://github.com/$REPO" \
            --argjson tags "$TAGS" \
            --arg now "$NOW" \
            '.name = $name |
             .display_name = $displayName |
             .version = $version |
             .description = $description |
             .repo_url = $repoUrl |
             .tags = $tags |
             .status = (if .status then .status else "active" end) |
             .changelog_updated_at = $now |
             .docs_updated_at = $now' \
            "$FILE" > tmp.json && mv tmp.json "$FILE"

      - name: Buscar changelog e docs do projeto
        env:
          PORTFOLIO_TOKEN: ${{ secrets.PORTFOLIO_TOKEN }}
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          REPO="${{ github.event.client_payload.repo }}"

          mkdir -p "docs/$PROJECT"

          fetch_file() {
            local src=$1
            local dest=$2
            curl -s -w "%{http_code}" \
              -H "Authorization: token $PORTFOLIO_TOKEN" \
              -H "Accept: application/vnd.github.v3.raw" \
              "https://api.github.com/repos/$REPO/contents/$src" \
              -o "$dest"
          }

          fetch_file "CHANGELOG.md" "docs/$PROJECT/CHANGELOG.md"
          fetch_file "docs/README.md" "docs/$PROJECT/README.md"
          fetch_file "docs/architecture.md" "docs/$PROJECT/architecture.md"
          fetch_file "docs/usage.md" "docs/$PROJECT/usage.md"

      - name: Commitar mudanças
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          VERSION="${{ github.event.client_payload.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "projects/$PROJECT.json" "docs/$PROJECT/"
          git diff --staged --quiet || git commit -m "chore($PROJECT): update to v$VERSION [skip ci]"
          git pull --rebase origin main
          git push
