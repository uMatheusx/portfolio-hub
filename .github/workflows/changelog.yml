name: Update Changelog

on:
  push:
    branches: [main]
    paths-ignore:
      - CHANGELOG.md
      - 'docs/**'
      - 'content/**'
      - 'projects/**'

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate changelog since last tag
        id: changelog
        run: |
          git config user.name "portfolio-bot[bot]"
          git config user.email "portfolio-bot@users.noreply.github.com"
          # -r 1 gera apenas desde o último git tag (não reescreve histórico anterior)
          npx conventional-changelog -p angular -i CHANGELOG.md -s -r 1
          if git diff --quiet CHANGELOG.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changelog
        if: steps.changelog.outputs.changed == 'true'
        run: |
          git add CHANGELOG.md
          git commit -m "docs: update changelog [skip ci]"
          git push
